<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--s1:#0a0a0a;--s2:#111;--s3:#1a1a1a;--s4:#222;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.1);--b3:rgba(255,255,255,.18);
  --fg:#fff;--fg2:rgba(255,255,255,.5);--fg3:rgba(255,255,255,.2);
  --up:#00c97a;--up2:rgba(0,201,122,.1);
  --dn:#ff3b5c;--dn2:rgba(255,59,92,.1);
  --acc:#fff;
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',sans-serif;
  --r:6px;
}
html,body{height:100%;background:var(--bg)}
body{font-family:var(--sans);color:var(--fg);font-size:13px;line-height:1.5}
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b3);border-radius:2px}

/* ── TOPBAR ── */
.topbar{height:48px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;background:var(--bg)}
.brand{font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.12em;color:var(--fg3)}
.topbar-r{display:flex;align-items:center;gap:16px}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--up);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.clk{font-family:var(--mono);font-size:10px;color:var(--fg3)}

/* ── LAYOUT ── */
.shell{display:grid;grid-template-columns:240px 1fr;height:calc(100vh - 48px)}

/* ── SIDEBAR ── */
.sidebar{border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

.hero{padding:20px;border-bottom:1px solid var(--b1)}
.hero-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--fg3);margin-bottom:8px}
.hero-val{font-family:var(--mono);font-size:26px;font-weight:500;color:var(--fg);letter-spacing:-.02em;line-height:1}
.hero-sub{margin-top:6px;display:flex;align-items:center;gap:6px}
.pill{display:inline-flex;padding:2px 7px;border-radius:20px;font-family:var(--mono);font-size:10px;font-weight:500}
.pill-up{background:var(--up2);color:var(--up)}.pill-dn{background:var(--dn2);color:var(--dn)}
.hero-abs{font-family:var(--mono);font-size:10px;color:var(--fg3)}

.kpis{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--b1)}
.kpi{padding:12px 16px;border-right:1px solid var(--b1)}
.kpi:nth-child(2n){border-right:none}
.kpi-l{font-family:var(--mono);font-size:8px;letter-spacing:.12em;color:var(--fg3);margin-bottom:3px}
.kpi-v{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--fg)}
.kpi-s{font-family:var(--mono);font-size:9px;margin-top:1px}

.nav{padding:8px}
.nb{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border-radius:var(--r);border:none;background:none;color:var(--fg2);cursor:pointer;font-family:var(--sans);font-size:12px;font-weight:400;text-align:left;transition:all .12s}
.nb:hover{background:var(--b1);color:var(--fg)}
.nb.on{background:var(--b2);color:var(--fg)}
.nb-ic{font-family:var(--mono);font-size:10px;width:14px;flex-shrink:0;opacity:.4}
.nb.on .nb-ic{opacity:.8}

/* ── MAIN ── */
.main{overflow-y:auto;background:var(--bg)}
.panel{display:none;padding:20px}
.panel.on{display:block}
#tab-posiciones{padding:16px}

/* ── DASHBOARD ── */
.dash-grid{display:grid;grid-template-columns:1fr 280px;gap:16px;margin-bottom:16px}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:10px;overflow:hidden}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--b1)}
.card-ttl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--fg2)}
.per-row{display:flex;gap:1px;background:var(--b1);border-radius:4px;padding:2px}
.pb{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:3px;border:none;background:none;color:var(--fg3);cursor:pointer;transition:all .1s}
.pb.on{background:var(--s3);color:var(--fg)}
.pb:hover:not(.on){color:var(--fg2)}
.chart-body{height:200px;padding:12px 14px 8px;position:relative}

.chart-stats{display:flex;gap:20px;padding:10px 16px 14px}
.cs-item{display:flex;flex-direction:column;gap:1px}
.cs-l{font-family:var(--mono);font-size:8px;letter-spacing:.1em;color:var(--fg3)}
.cs-v{font-family:var(--mono);font-size:12px;font-weight:500}

.donut-wrap{position:relative;height:160px;padding:14px}
.donut-ct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.dc-n{font-family:var(--mono);font-size:18px;font-weight:500}
.dc-l{font-family:var(--mono);font-size:8px;letter-spacing:.1em;color:var(--fg3)}
.donut-leg{padding:0 16px 14px;display:flex;flex-direction:column;gap:5px}
.dl{display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:9px}
.dl-l{display:flex;align-items:center;gap:5px;color:var(--fg2)}
.dl-dot{width:6px;height:6px;border-radius:2px;flex-shrink:0}
.dl-v{color:var(--fg3)}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.sc{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:16px}
.sc-l{font-family:var(--mono);font-size:8px;letter-spacing:.12em;color:var(--fg3);margin-bottom:6px}
.sc-v{font-family:var(--mono);font-size:18px;font-weight:500}
.sc-s{font-family:var(--mono);font-size:9px;margin-top:3px;color:var(--fg3)}

/* ── TABLE ── */
.sec-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-l{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--fg3)}
.tbl-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead{background:var(--bg);border-bottom:1px solid var(--b1)}
th{font-family:var(--mono);font-size:7.5px;letter-spacing:.08em;color:var(--fg2);padding:8px 7px;text-align:right;white-space:nowrap;font-weight:500;overflow:hidden}
th:first-child{text-align:left}
td{padding:8px 7px;border-bottom:1px solid var(--b1);text-align:right;vertical-align:middle;overflow:hidden}
td:first-child{text-align:left}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--s2)}
.t-sym{font-family:var(--mono);font-size:10px;font-weight:500}
.t-name{font-size:9px;color:var(--fg3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-n{font-family:var(--mono);font-size:10px}
.t-s{font-family:var(--mono);font-size:8px;margin-top:1px;color:var(--fg3)}
.up{color:var(--up)}.dn{color:var(--dn)}
.upside{display:inline-block;font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:20px;font-weight:500}
.upside.up{background:var(--up2);color:var(--up)}.upside.dn{background:var(--dn2);color:var(--dn)}
.ed{width:52px;padding:4px 5px;font-family:var(--mono);font-size:9px;background:var(--s3);border:1px solid var(--b2);border-radius:4px;color:var(--fg);text-align:right;transition:border-color .1s}
.ed:focus{outline:none;border-color:var(--b3)}
.tbl-hint{font-family:var(--mono);font-size:7.5px;color:var(--fg3);padding:7px 12px;border-top:1px solid var(--b1)}
.no-key-bar{background:rgba(255,200,0,.07);border-bottom:1px solid rgba(255,200,0,.15);padding:7px 12px;font-family:var(--mono);font-size:8px;color:rgba(255,200,0,.7)}
.mn{font-family:var(--mono);font-size:10px}
.mn2{font-family:var(--mono);font-size:8px;color:var(--fg3)}
.gold{color:rgba(255,200,0,.9)}
.tag-sm{font-family:var(--mono);font-size:7px;padding:1px 4px;border-radius:3px;background:var(--b1);color:var(--fg3);white-space:nowrap}
.add-form{background:var(--s1);border:1px solid var(--b1);border-radius:10px;margin-bottom:12px;overflow:hidden}
.add-form-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none}
.add-form-hd:hover{background:var(--s2)}
.add-form-ttl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--fg2)}
.add-form-toggle{font-family:var(--mono);font-size:10px;color:var(--fg3)}
.add-form-body{padding:14px;border-top:1px solid var(--b1);display:none}
.add-form-body.open{display:block}
.lookup-card.show{display:flex}
.lookup-logo{width:32px;height:32px;border-radius:6px;background:var(--s3);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.lookup-logo img{width:100%;height:100%;object-fit:contain}
.lookup-name{font-family:var(--sans);font-size:13px;font-weight:500;color:var(--fg)}
.lookup-meta{display:flex;gap:8px;margin-top:3px;align-items:center}
.lookup-tag{display:inline-block;font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:3px;background:var(--b1);color:var(--fg2);letter-spacing:.06em}
.lookup-spin{font-family:var(--mono);font-size:9px;color:var(--fg3)}

/* ── DIVIDENDOS ── */
.div-sum{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--b1);border:1px solid var(--b1);border-radius:10px;overflow:hidden;margin-bottom:16px}
.dk{background:var(--s1);padding:14px 16px}
.dk-l{font-family:var(--mono);font-size:8px;letter-spacing:.12em;color:var(--fg3);margin-bottom:4px}
.dk-v{font-family:var(--mono);font-size:18px;font-weight:500}
.dk-s{font-family:var(--mono);font-size:9px;margin-top:2px;color:var(--fg3)}
.div-grid{display:grid;grid-template-columns:1fr 260px;gap:16px}
.bar-card{background:var(--s1);border:1px solid var(--b1);border-radius:10px;overflow:hidden}
.bar-list{padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.bar-item-top{display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:10px;margin-bottom:4px}
.bar-bg{height:2px;background:var(--b1);border-radius:1px;overflow:hidden}
.bar-fill{height:100%;border-radius:1px;transition:width .5s ease}
.bar-sub{font-family:var(--mono);font-size:8px;color:var(--fg3);margin-top:3px}

/* ── FORM / CONFIG ── */
.fc{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:20px;margin-bottom:16px}
.fc-ttl{font-family:var(--mono);font-size:8px;letter-spacing:.14em;color:var(--fg3);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--b1)}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px}
.fi{display:flex;flex-direction:column;gap:4px}
.fl{font-family:var(--mono);font-size:8px;letter-spacing:.1em;color:var(--fg3)}
.fi input,.fi select{padding:8px 10px;font-family:var(--mono);font-size:11px;background:var(--s3);border:1px solid var(--b1);border-radius:var(--r);color:var(--fg);transition:border-color .12s}
.fi input:focus,.fi select:focus{outline:none;border-color:var(--b3)}
.fa{display:flex;align-items:center;gap:10px}
.btn{padding:8px 18px;font-family:var(--sans);font-size:12px;font-weight:500;border-radius:var(--r);border:1px solid var(--b2);background:transparent;color:var(--fg2);cursor:pointer;transition:all .12s}
.btn:hover{background:var(--b1);color:var(--fg)}
.btn-p{background:var(--fg);border-color:var(--fg);color:var(--bg);font-weight:600}
.btn-p:hover{opacity:.88;background:var(--fg)}
.btn-rm{color:var(--dn);border-color:transparent;padding:5px 8px;font-size:11px}
.btn-rm:hover{background:var(--dn2)}
.fm{font-family:var(--mono);font-size:10px}
.fn{font-family:var(--mono);font-size:9px;color:var(--fg3);line-height:2;margin-top:12px}
.loading-row{font-family:var(--mono);font-size:9px;color:var(--fg3);padding:4px 0;display:flex;align-items:center;gap:6px}
.spin{display:inline-block;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{padding:40px;text-align:center;font-family:var(--mono);font-size:10px;color:var(--fg3)}

/* ── WATCHLIST ── */
.wl-add-row{display:flex;gap:8px;padding:12px 14px;border-bottom:1px solid var(--b1);align-items:center}
.wl-add-row input{flex:1;padding:7px 10px;font-family:var(--mono);font-size:11px;background:var(--s3);border:1px solid var(--b1);border-radius:var(--r);color:var(--fg);text-transform:uppercase}
.wl-add-row input:focus{outline:none;border-color:var(--b3)}
.wl-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--b1);border-bottom:1px solid var(--b1)}
.wl-row:last-child{border-bottom:none}
.wl-row:hover{filter:brightness(1.15)}
.wl-main{background:var(--s1);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.wl-cell{background:var(--s1);padding:8px 14px;display:flex;flex-direction:column;justify-content:center;gap:2px}
.wl-cell-lbl{font-family:var(--mono);font-size:8px;letter-spacing:.08em;color:var(--fg3)}
.wl-cell-val{font-family:var(--mono);font-size:11px;color:var(--fg)}
.wl-cell-sub{font-family:var(--mono);font-size:9px;color:var(--fg3)}
.wl-ticker{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--fg)}
.wl-name{font-size:10px;color:var(--fg3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}
.wl-price{font-family:var(--mono);font-size:13px;font-weight:500;text-align:right}
.wl-chg{font-family:var(--mono);font-size:10px;text-align:right;margin-top:1px}
.wl-loading{font-family:var(--mono);font-size:9px;color:var(--fg3);padding:20px 14px;text-align:center}
.wl-section-hd{font-family:var(--mono);font-size:8px;letter-spacing:.1em;color:var(--fg3);padding:6px 14px;background:var(--bg);border-bottom:1px solid var(--b1)}
.obj-card{background:var(--s1);border:1px solid var(--b1);border-radius:10px;overflow:hidden;margin-top:16px}
.obj-hd{padding:10px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.obj-ttl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--fg2)}
.obj-table{width:100%;border-collapse:collapse}
.obj-table th{font-family:var(--mono);font-size:8px;letter-spacing:.08em;color:var(--fg2);padding:8px 14px;text-align:right;font-weight:500;border-bottom:1px solid var(--b1);background:var(--bg)}
.obj-table th:first-child{text-align:left}
.obj-table td{padding:9px 14px;border-bottom:1px solid var(--b1);text-align:right;font-family:var(--mono);font-size:11px;color:var(--fg)}
.obj-table td:first-child{text-align:left;color:var(--fg2);font-size:10px}
.obj-table tbody tr:last-child td{border-bottom:none}
.obj-table tbody tr:hover{background:var(--s2)}
.obj-ed{width:100%;max-width:80px;padding:4px 6px;font-family:var(--mono);font-size:11px;background:var(--s3);border:1px solid var(--b2);border-radius:4px;color:var(--fg);text-align:right;transition:border-color .1s;box-sizing:border-box}
.obj-ed:focus{outline:none;border-color:var(--b3)}
.obj-present-ok{color:var(--up);font-weight:500}
.obj-present-warn{color:var(--dn);font-weight:500}

/* ── MOBILE BOTTOM NAV ── */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--s1);border-top:1px solid var(--b1);z-index:200;grid-template-columns:repeat(4,1fr)}
.mob-nb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--fg3);cursor:pointer;padding:6px 0;transition:color .12s}
.mob-nb.on{color:var(--fg)}
.mob-nb-ic{font-family:var(--mono);font-size:14px;line-height:1}
.mob-nb-lbl{font-family:var(--mono);font-size:8px;letter-spacing:.06em}

/* ── MOBILE SUMMARY HEADER ── */
.mob-hero{display:none;padding:16px;border-bottom:1px solid var(--b1)}
.mob-kpis{display:none;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--b1);border-bottom:1px solid var(--b1)}

/* ── POSITION CARDS (mobile) ── */
.pos-card{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:14px;margin-bottom:10px}
.pos-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.pos-card-name{font-size:13px;font-weight:500}
.pos-card-tags{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
.pos-card-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.pos-card-item{display:flex;flex-direction:column;gap:2px}
.pos-card-lbl{font-family:var(--mono);font-size:8px;letter-spacing:.08em;color:var(--fg3)}
.pos-card-val{font-family:var(--mono);font-size:11px;color:var(--fg)}
.pos-card-edit{font-family:var(--mono);font-size:11px;background:var(--s3);border:1px solid var(--b1);border-radius:4px;color:var(--fg);padding:3px 6px;width:100%;text-align:right}
.pos-card-edit:focus{outline:none;border-color:var(--b3)}
.pos-totals{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:14px;margin-bottom:10px}
.pos-totals-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.pos-totals-lbl{font-family:var(--mono);font-size:9px;color:var(--fg3)}
.pos-totals-val{font-family:var(--mono);font-size:12px;font-weight:500}

@media(max-width:700px){
  html,body{height:auto;min-height:100%}
  .shell{display:block;height:auto;min-height:calc(100vh - 48px - 56px)}
  .sidebar{display:none}
  .mob-nav{display:grid}
  .mob-hero{display:block}
  .mob-kpis{display:grid}
  .main{padding-bottom:56px}
  .panel{padding:12px}
  #tab-posiciones{padding:12px}
  .dash-grid{grid-template-columns:1fr}
  .div-grid{grid-template-columns:1fr}
  .stat-row{grid-template-columns:1fr 1fr}
  .div-sum{grid-template-columns:1fr 1fr}
  .tbl-wrap{display:none}
  .sec-row{margin-bottom:10px}
  .pos-mobile{display:block}
  .pos-desktop{display:none}
  .chart-body{height:160px}
  .add-form .fg{grid-template-columns:1fr}
}
@media(min-width:701px){
  .pos-mobile{display:none}
  .pos-desktop{display:block}
  .mob-hero,.mob-kpis,.mob-nav{display:none!important}
}
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">PORTFOLIO</span>
  <div class="topbar-r">
    <span class="live-dot"></span>
    <span class="clk" id="clk">--:--:--</span>
  </div>
</div>

<!-- MOBILE SUMMARY HEADER -->
<div class="mob-hero">
  <div class="hero-lbl">Total Cuenta</div>
  <div class="hero-val" id="mob-total" style="font-family:var(--mono);font-size:24px;font-weight:500;letter-spacing:-.02em">€ 0,00</div>
  <div class="hero-sub" style="margin-top:5px;display:flex;gap:6px;align-items:center">
    <span id="mob-pill" class="pill pill-up">+0,00%</span>
    <span id="mob-abs" style="font-family:var(--mono);font-size:10px;color:var(--fg3)">+€0 cartera</span>
  </div>
</div>
<div class="mob-kpis">
  <div class="kpi"><div class="kpi-l">Cartera</div><div class="kpi-v" id="mob-cartera" style="font-size:12px">€0</div></div>
  <div class="kpi"><div class="kpi-l">Cash</div><div class="kpi-v" id="mob-cash" style="font-size:12px">€0</div></div>
  <div class="kpi"><div class="kpi-l">Div. anual</div><div class="kpi-v" id="mob-div" style="font-size:12px">€0</div></div>
</div>

<script>
const C=['#4d9fff','#00c97a','#ff9f40','#c084fc','#ff6b6b','#34d399','#60a5fa','#fb923c','#a3e635','#f472b6'];

// Returns a logo img element or a monogram fallback, always 20x20
function logoEl(logo,sym,size=20){
  if(logo)return`<img src="${logo}" style="width:${size}px;height:${size}px;border-radius:4px;object-fit:contain;background:var(--s3);flex-shrink:0" onerror="this.style.display='none'">`;
  return`<span style="width:${size}px;height:${size}px;border-radius:4px;background:var(--s3);display:inline-flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:${Math.floor(size*0.4)}px;color:var(--fg3);flex-shrink:0">${(sym||'').slice(0,2)}</span>`;
}
function sourceLabel(src){
  if(!src)return'';
  return`<span style="font-family:var(--mono);font-size:8px;color:var(--fg3);letter-spacing:.04em">${src==='yahoo'?'Yahoo Finance':'Finnhub'}</span>`;
}

let pf=JSON.parse(localStorage.getItem('pf6')||'[]');
let prices={},tgts=JSON.parse(localStorage.getItem('pf6t')||'{}'),divs={};
// hist: [{d:'2024-01-15', cartera:12000, cash:5000, cuenta:17000}]
let hist=JSON.parse(localStorage.getItem('pf6h')||'[]');
// cashHist: [{d:'2024-01-15', v:5000}] — snapshot of cash each day it changes
let cashHist=JSON.parse(localStorage.getItem('pf6ch')||'[]');
let fkey=localStorage.getItem('fkey6')||'';
let fx={};
let aper=30,lc=null,dc=null,curTab='dashboard';

// Currency symbols for display
const CSYM={'USD':'$','GBP':'£','EUR':'€','JPY':'¥','CHF':'Fr','CAD':'C$','AUD':'A$','HKD':'HK$','SEK':'kr','NOK':'kr','DKK':'kr'};

function save(){localStorage.setItem('pf6',JSON.stringify(pf));localStorage.setItem('pf6t',JSON.stringify(tgts));localStorage.setItem('pf6h',JSON.stringify(hist));localStorage.setItem('pf6ch',JSON.stringify(cashHist))}
function saveKey(k){fkey=k.trim();localStorage.setItem('fkey6',fkey)}

// Price in local currency
function gP(p){return prices[p.symbol]?.price||p.avgPrice}
// Currency of the stock (default USD)
function gSource(p){return prices[p.symbol]?.source||''}
function gCur(p){return prices[p.symbol]?.currency||p.currency||'USD'}
// FX rate to EUR for a given currency
function fxRate(cur){if(cur==='EUR')return 1;return fx[cur]||1}
// Price converted to EUR
function gPeur(p){return gP(p)*fxRate(gCur(p))}
// avgPrice converted to EUR (stored in local currency)
function avgPeur(p){return p.avgPrice*fxRate(gCur(p))}
// Change % (same in any currency)
function gC(p){return prices[p.symbol]?.change||0}
// Dividend in EUR
function gD(p){return(divs[p.symbol]||0)*fxRate(gCur(p))}

function fmtLocal(n,cur='USD',d=2){const s=CSYM[cur]||cur+' ';return s+n.toLocaleString('es-ES',{minimumFractionDigits:d,maximumFractionDigits:d,useGrouping:true})}
function fmt(n,d=2){return'€'+n.toLocaleString('es-ES',{minimumFractionDigits:d,maximumFractionDigits:d,useGrouping:true})}
function fmtN(n,d=2){return n.toLocaleString('es-ES',{minimumFractionDigits:d,maximumFractionDigits:d,useGrouping:true})}
function fp(n){return(n>=0?'+':'')+fmtN(Math.abs(n),2)+'%'}
function yc(y){return'var(--fg)'}

function calcM(){
  let inv=0,val=0,div=0;
  pf.forEach(p=>{
    inv+=p.shares*avgPeur(p);
    val+=p.shares*gPeur(p);
    div+=gD(p)*p.shares;
  });
  return{inv,val,gain:val-inv,gainP:inv>0?(val-inv)/inv*100:0,div,yld:val>0?div/val*100:0};
}

/* ─── FETCH ─── */
async function fetchQuoteYahoo(sym){
  // Yahoo Finance uses same ticker format for most exchanges
  // .MC → works, .L → works, plain US tickers → works
  const r=await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=2d`);
  const d=await r.json();
  const meta=d?.chart?.result?.[0]?.meta;
  if(!meta||!meta.regularMarketPrice)throw new Error('no yahoo data');
  const price=meta.regularMarketPrice;
  const prev=meta.chartPreviousClose||meta.previousClose||price;
  const change=prev>0?((price-prev)/prev)*100:0;
  const cur=(meta.currency||'USD').toUpperCase();
  return{price,change,currency:cur};
}

async function fetchQuote(sym){
  // Try Finnhub first
  try{
    const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${fkey}`);
    const d=await r.json();
    if(!d.c||d.c===0)throw new Error('no data');
    const cur=prices[sym]?.currency||'USD';
    prices[sym]={price:d.c,change:d.pc>0?((d.c-d.pc)/d.pc)*100:0,currency:cur,source:'finnhub'};
    return;
  }catch{}
  // Fallback to Yahoo Finance
  try{
    const y=await fetchQuoteYahoo(sym);
    prices[sym]={...y,source:'yahoo'};
    // Also update currency on position if missing
    const idx=pf.findIndex(p=>p.symbol===sym);
    if(idx>=0&&!pf[idx].currency){pf[idx].currency=y.currency;save()}
  }catch{}
}

async function fetchFxRates(){
  // Get all unique non-EUR currencies in portfolio
  const curs=[...new Set(pf.map(p=>p.currency||'USD').filter(c=>c&&c!=='EUR'))];
  if(!curs.length)return;
  for(const cur of curs){
    if(fx[cur]&&fx[cur]>0)continue; // already have it
    try{
      // Finnhub forex: e.g. OANDA:USD_EUR
      const pair=`OANDA:${cur}_EUR`;
      const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${pair}&token=${fkey}`);
      const d=await r.json();
      if(d.c&&d.c>0){fx[cur]=d.c}
      await sleep(120);
    }catch{}
  }
  // Hardcode fallback rates if fetch failed (updated periodically in code)
  const fallback={USD:0.92,GBP:1.17,JPY:0.0061,CHF:1.04,CAD:0.68,AUD:0.60,HKD:0.118,SEK:0.088,NOK:0.086,DKK:0.134};
  curs.forEach(c=>{if(!fx[c]||fx[c]===0)fx[c]=fallback[c]||1});
}

async function fetchDividend(sym){
  try{
    // stock/metric returns dividendPerShareAnnual directly — much more reliable than dividend2
    const r=await fetch(`https://finnhub.io/api/v1/stock/metric?symbol=${sym}&metric=all&token=${fkey}`);
    const d=await r.json();
    const annual=d?.metric?.dividendPerShareAnnual;
    if(annual!==undefined&&annual!==null){divs[sym]=parseFloat(annual)||0;return}
    // Fallback: try dividend2 and sum last 4 quarterly payments
    const r2=await fetch(`https://finnhub.io/api/v1/stock/dividend2?symbol=${sym}&token=${fkey}`);
    const d2=await r2.json();
    const data=(d2.data||[]).slice(0,4);
    divs[sym]=parseFloat(data.reduce((s,x)=>s+(parseFloat(x.amount)||0),0).toFixed(4));
  }catch{divs[sym]=0}
}

async function fetchProfile(sym){
  if(!fkey)return null;
  // Try Finnhub first
  try{
    const r=await fetch(`https://finnhub.io/api/v1/stock/profile2?symbol=${sym}&token=${fkey}`);
    const d=await r.json();
    if(d&&d.name){
      const currency=(d.currency||'USD').toUpperCase();
      if(!prices[sym])prices[sym]={price:0,change:0,currency};
      else prices[sym].currency=currency;
      return{name:d.name,country:d.country||'',exchange:d.exchange||'',logo:d.logo||'',currency};
    }
  }catch{}
  // Fallback to Yahoo Finance for name and currency
  try{
    const r=await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=1d`);
    const d=await r.json();
    const meta=d?.chart?.result?.[0]?.meta;
    if(meta){
      const currency=(meta.currency||'EUR').toUpperCase();
      const name=meta.longName||meta.shortName||sym;
      const exchange=meta.exchangeName||'';
      if(!prices[sym])prices[sym]={price:0,change:0,currency};
      else prices[sym].currency=currency;
      return{name,country:'',exchange,logo:'',currency,source:'yahoo'};
    }
  }catch{}
  return null;
}

async function fetchAll(){
  if(!pf.length){renderAll();return}
  if(!fkey){renderAll();return}
  const syms=[...new Set(pf.map(p=>p.symbol))];
  // Fetch profiles first to get currencies (skip if already cached in prices)
  for(const sym of syms){
    if(!prices[sym]?.currency){
      const prof=await fetchProfile(sym);
      if(prof){
        const idx=pf.findIndex(p=>p.symbol===sym);
        if(idx>=0){
          if(!pf[idx].currency)pf[idx].currency=prof.currency;
          if(!pf[idx].logo&&prof.logo)pf[idx].logo=prof.logo;
          save();
        }
      }
      await sleep(120);
    }
  }
  // Fetch FX rates for all currencies
  await fetchFxRates();
  // Fetch quotes
  for(const sym of syms){
    try{await fetchQuote(sym)}catch{}
    await sleep(120);
  }
  // Fetch dividends once
  for(const sym of syms){
    if(divs[sym]===undefined){
      await fetchDividend(sym);
      await sleep(120);
    }
  }
  renderAll();
}

async function refreshDivs(){
  if(!fkey||!pf.length)return;
  for(const p of pf){delete divs[p.symbol]}
  for(const p of pf){await fetchDividend(p.symbol);await sleep(120)}
  renderAll();
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

function recHist(){
  // Records closing values of the previous day — only called at midnight
  if(!pf.length)return;
  const yesterday=new Date();
  yesterday.setDate(yesterday.getDate()-1);
  const d=yesterday.toISOString().slice(0,10);
  if(hist.find(h=>h.d===d))return; // already recorded
  const cartera=parseFloat(calcM().val.toFixed(2));
  const cash=parseFloat(localStorage.getItem('pf6_cash')||0);
  const cuenta=parseFloat((cartera+cash).toFixed(2));
  hist.push({d,cartera,cash,cuenta});
  hist.sort((a,b)=>a.d.localeCompare(b.d));
  if(hist.length>730)hist=hist.slice(-730);
  save();
}

function scheduleSnapshot(){
  const now=new Date();
  const midnight=new Date(now);
  midnight.setHours(24,0,1,0); // 00:00:01 next day
  const msUntil=midnight-now;
  setTimeout(()=>{
    recHist();
    if(curTab==='historico')renderHistorico();
    drawLine(aper);
    scheduleSnapshot();
  },msUntil);
}

/* ─── RENDER ─── */
function renderAll(){
  updateClock();updateSidebar();
  if(curTab==='dashboard'){renderDash()}
  if(curTab==='posiciones')renderPos();
  if(curTab==='dividendos')renderDiv();
  if(curTab==='historico')renderHistorico();
}

function updateClock(){document.getElementById('clk').textContent=new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}

function updateSidebar(){
  const m=calcM();
  const cash=parseFloat(localStorage.getItem('pf6_cash')||0);
  const totalCuenta=m.val+cash;
  // Net dividend (after retentions)
  const divNeto=pf.reduce((s,p)=>s+gD(p)*(1-(parseFloat(p.retencion||0)/100))*p.shares,0);
  const yldNeto=m.val>0?divNeto/m.val*100:0;
  // Desktop
  document.getElementById('sb-total').textContent='€ '+totalCuenta.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2,useGrouping:true});
  const pill=document.getElementById('sb-pill');pill.textContent=fp(m.gainP);pill.className='pill '+(m.gain>=0?'pill-up':'pill-dn');
  document.getElementById('sb-abs').textContent=(m.gain>=0?'+':'')+fmt(m.gain)+' cartera';
  document.getElementById('sb-cartera').textContent=fmt(m.val,2);
  document.getElementById('sb-cash').textContent=fmt(cash,2);
  document.getElementById('sb-inv').textContent=fmt(m.inv,2);
  document.getElementById('sb-pos').textContent=pf.length;
  document.getElementById('sb-div').textContent=fmt(divNeto,2);
  const yn=document.getElementById('sb-yld-net');if(yn)yn.textContent=fmtN(yldNeto,2)+'% yield neto';
  document.getElementById('sb-yld').textContent=fmtN(m.yld,2)+'%';
  // Mobile
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v};
  set('mob-total','€ '+totalCuenta.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2,useGrouping:true}));
  const mp=document.getElementById('mob-pill');if(mp){mp.textContent=fp(m.gainP);mp.className='pill '+(m.gain>=0?'pill-up':'pill-dn')}
  set('mob-abs',(m.gain>=0?'+':'')+fmt(m.gain)+' cartera');
  set('mob-cartera',fmt(m.val,2));
  set('mob-cash',fmt(cash,2));
  set('mob-div',fmt(divNeto,2));
}

/* ─── DASHBOARD ─── */
function renderDash(){
  const el=document.getElementById('tab-dashboard');
  if(!pf.length){el.innerHTML=`<div class="empty">Añade tus primeras posiciones en Configuración</div>`;return}
  const m=calcM();
  el.innerHTML=`
    <div class="dash-grid">
      <div class="card">
        <div class="card-hd">
          <span class="card-ttl">Evolución del portfolio</span>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="display:flex;gap:10px;font-family:var(--mono);font-size:8px;color:var(--fg3)">
              <span style="display:flex;align-items:center;gap:4px"><span style="width:14px;height:1.5px;background:#fff;display:inline-block"></span>Cuenta</span>
              <span style="display:flex;align-items:center;gap:4px"><span style="width:14px;height:1.5px;background:#00c97a;display:inline-block"></span>Cartera</span>
              <span style="display:flex;align-items:center;gap:4px"><span style="width:14px;height:1px;background:rgba(255,255,255,.3);display:inline-block"></span>Cash</span>
            </div>
            <div class="per-row">
              <button class="pb${aper===7?' on':''}" onclick="setPer(7)">7D</button>
              <button class="pb${aper===30?' on':''}" onclick="setPer(30)">1M</button>
              <button class="pb${aper===90?' on':''}" onclick="setPer(90)">3M</button>
              <button class="pb${aper===365?' on':''}" onclick="setPer(365)">1A</button>
            </div>
          </div>
        </div>
        <div class="chart-body"><canvas id="lc"></canvas></div>
        <div class="chart-stats">
          <div class="cs-item"><div class="cs-l">Cartera</div><div class="cs-v">${fmt(m.val)}</div></div>
          <div class="cs-item"><div class="cs-l">G / P</div><div class="cs-v" style="color:${m.gain>=0?'var(--up)':'var(--dn)'}">${fp(m.gainP)}</div></div>
          <div class="cs-item"><div class="cs-l">Invertido</div><div class="cs-v" style="color:var(--fg2)">${fmt(m.inv)}</div></div>
          <div class="cs-item"><div class="cs-l">Registros</div><div class="cs-v" style="font-size:13px">${hist.length}</div></div>
        </div>
      </div>
      <div class="card">
        <div class="card-hd"><span class="card-ttl">Distribución</span></div>
        <div class="donut-wrap"><canvas id="dc"></canvas>
          <div class="donut-ct"><div class="dc-n">${pf.length}</div><div class="dc-l">activos</div></div>
        </div>
        <div class="donut-leg" id="dleg"></div>
      </div>
    </div>
    <div id="objetivos-block"></div>`;
  setTimeout(()=>{drawLine(aper);drawDonut();renderObjetivos()},30);
}

function buildPts(days){
  if(hist.length>=2){
    const cut=new Date();cut.setDate(cut.getDate()-days);
    const pts=hist.filter(h=>new Date(h.d)>=cut);
    if(pts.length>1)return pts;
  }
  // Fallback: simulate with current values
  const m=calcM();
  const cash=parseFloat(localStorage.getItem('pf6_cash')||0);
  const arr=[];
  for(let i=days-1;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const f=i===0?1:1-(i*(.0005+Math.random()*.0004));
    const n=(Math.random()-.48)*.014;
    const cartera=parseFloat(Math.max(0,m.val*f*(1+n)).toFixed(2));
    const cuenta=parseFloat((cartera+cash).toFixed(2));
    arr.push({d:d.toISOString().slice(0,10),cartera,cash,cuenta});
  }
  return arr;
}

function setPer(d){aper=d;document.querySelectorAll('.pb').forEach((b,i)=>b.classList.toggle('on',[7,30,90,365][i]===d));drawLine(d)}

function drawLine(days){
  const ctx=document.getElementById('lc');if(!ctx)return;
  if(lc)lc.destroy();
  const pts=buildPts(days);
  if(!pts.length)return;
  const labels=pts.map(p=>p.d);
  const carteraVals=pts.map(p=>p.cartera);
  const cashVals=pts.map(p=>p.cash);
  const cuentaVals=pts.map(p=>p.cuenta);
  const lastC=carteraVals[carteraVals.length-1],firstC=carteraVals[0];
  const upColor=lastC>=(firstC||0)?'#00c97a':'#ff3b5c';

  lc=new Chart(ctx,{type:'line',
    data:{
      labels,
      datasets:[
        {label:'Cuenta',data:cuentaVals,borderColor:'#fff',borderWidth:1.5,pointRadius:0,pointHoverRadius:3,fill:false,tension:.35},
        {label:'Cartera',data:carteraVals,borderColor:upColor,borderWidth:1.5,pointRadius:0,pointHoverRadius:3,fill:true,
          backgroundColor:c2=>{const g=c2.chart.ctx.createLinearGradient(0,0,0,200);g.addColorStop(0,upColor+'28');g.addColorStop(1,upColor+'00');return g},tension:.35},
        {label:'Cash',data:cashVals,borderColor:'rgba(255,255,255,.25)',borderWidth:1,borderDash:[3,3],pointRadius:0,pointHoverRadius:3,fill:false,tension:.35},
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{backgroundColor:'#111',borderColor:'rgba(255,255,255,.1)',borderWidth:1,
          titleFont:{family:'JetBrains Mono',size:9},bodyFont:{family:'JetBrains Mono',size:11},
          titleColor:'rgba(255,255,255,.4)',bodyColor:'#fff',
          callbacks:{
            title:i=>{const d=new Date(i[0].label);return d.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'})},
            label:i=>`  ${i.dataset.label}: ${fmt(i.raw,2)}`
          }
        }
      },
      scales:{
        x:{grid:{color:'rgba(255,255,255,.04)',drawBorder:false},ticks:{color:'rgba(255,255,255,.2)',font:{family:'JetBrains Mono',size:9},maxTicksLimit:6,callback:(v,i,tks)=>{if(i===0||i===tks.length-1||i===Math.floor(tks.length/2)){const d=new Date(pts[i]?.d);return d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'})}return''}},border:{display:false}},
        y:{position:'right',grid:{color:'rgba(255,255,255,.04)',drawBorder:false},ticks:{color:'rgba(255,255,255,.2)',font:{family:'JetBrains Mono',size:9},callback:v=>'€'+v.toLocaleString('es-ES',{maximumFractionDigits:0,useGrouping:true})},border:{display:false}}
      }
    }
  });
}

function drawDonut(){
  const ctx=document.getElementById('dc');if(!ctx)return;
  if(dc)dc.destroy();
  const total=pf.reduce((s,p)=>s+p.shares*gP(p),0)||1;
  const items=pf.map((p,i)=>({sym:p.symbol,val:p.shares*gP(p),c:C[i%C.length]})).sort((a,b)=>b.val-a.val);
  dc=new Chart(ctx,{type:'doughnut',

function drawStats(){

function renderObjetivos(){
  const el=document.getElementById('objetivos-block');

  const nAcciones=pf.length;

  const pesoMin=pesos.length?Math.min(...pesos):0;
  const pesoMax=pesos.length?Math.max(...pesos):0;
  const pesosSorted=[...pesos].sort((a,b)=>b-a);
  const top5=pesosSorted.slice(0,5).reduce((s,v)=>s+v,0);
  const cashPct=totalCuenta>0?cash/totalCuenta*100:0;
  const divNeto=pf.reduce((s,p)=>s+gD(p)*(1-(parseFloat(p.retencion||0)/100))*p.shares,0);

  // Helper: render present cell with color based on min/max
  function pCell(val,min,max,isEur=false,isPct=false){
    const fv=isEur?fmt(val,2):isPct?fmtN(val,2)+'%':fmtN(val,0);
    let ok=true;
    if(min!==undefined&&min>0&&val<min)ok=false;
    if(max!==undefined&&max>0&&val>max)ok=false;
    const cls=ok?'obj-present-ok':'obj-present-warn';
    return`<span class="${cls}">${fv}</span>`;
  }

  function edCell(key,val,placeholder=''){
    return`<input class="obj-ed" type="number" placeholder="${placeholder}" value="${val||''}" step="any" min="0" onchange="saveObj('${key}',this.value)">`;

    {
      label:'% mín. en una acción',
      min: edCell('pmin_min',obj.pmin_min,'2'),
      present: pCell(pesoMin,obj.pmin_min,undefined,false,true),
      max: '—',
    },
    {
      label:'% máx. en una acción',
      min: '—',
      present: pCell(pesoMax,undefined,obj.pmax_max,false,true),
      max: edCell('pmax_max',obj.pmax_max,'20'),
    },
    {
      label:'TOP 5',
      min: edCell('top5_min',obj.top5_min,'40'),
      present: pCell(top5,obj.top5_min,obj.top5_max,false,true),
      max: edCell('top5_max',obj.top5_max,'60'),

    {
      label:'Cash %',
      min: edCell('cash_min',obj.cash_min,'2.5'),
      present: pCell(cashPct,obj.cash_min,obj.cash_max,false,true),
      max: edCell('cash_max',obj.cash_max,'7.5'),
    },
    {
      label:'Total Cuenta',
      min: edCell('tc_min',obj.tc_min,'68000'),
      present: pCell(totalCuenta,obj.tc_min,undefined,true),
      max: '—',
    },
    {
      label:'Dividendo Neto',
      min: edCell('div_min',obj.div_min,'600'),
      present: pCell(divNeto,obj.div_min,undefined,true),
      max: '—',
    },
  ];

  el.innerHTML=`
    <div class="obj-card">
      <div class="obj-hd">
        <span class="obj-ttl">Objetivos 2026</span>
        <span style="font-family:var(--mono);font-size:8px;color:var(--fg3)">Verde = dentro del objetivo · Rojo = fuera del objetivo</span>
      </div>

        </tr></thead>

            <td>${r.present}</td>

/* ─── ACTIONS ─── */
let _profileCache={};

async function lookupTicker(){
  const sym=(document.getElementById('fsym')?.value||'').trim().toUpperCase();
  if(!sym)return;
  const card=document.getElementById('lookup-card');
  const spin=document.getElementById('lookup-spin');
  if(!card)return;
  if(!fkey){card.className='lookup-card';spin.style.display='none';return}
  if(_profileCache[sym]){showLookup(sym,_profileCache[sym]);return}
  card.className='lookup-card';
  spin.style.display='block';spin.textContent='Buscando '+sym+'…';
  const profile=await fetchProfile(sym);
  spin.style.display='none';
  if(profile){_profileCache[sym]=profile;showLookup(sym,profile)}
  else{spin.style.display='block';spin.textContent='No se encontró "'+sym+'" — verifica el ticker';spin.style.color='var(--dn)'}
}

function showLookup(sym,p){
  const card=document.getElementById('lookup-card');
  const logo=document.getElementById('lookup-logo');
  const name=document.getElementById('lookup-name');
  const meta=document.getElementById('lookup-meta');
  if(!card)return;
  if(p.logo){logo.innerHTML=`<img src="${p.logo}" onerror="this.style.display='none'">`}
  else{logo.innerHTML=`<span style="font-family:var(--mono);font-size:10px;color:var(--fg3)">${sym.slice(0,3)}</span>`}
  name.textContent=p.name;
  meta.innerHTML=`${p.country?`<span class="lookup-tag">${p.country}</span>`:''}${p.exchange?`<span class="lookup-tag">${p.exchange}</span>`:''}${p.currency?`<span class="lookup-tag" style="color:rgba(255,200,0,.8)">${p.currency}</span>`:''}`;
  card.className='lookup-card show';
  const spin=document.getElementById('lookup-spin');
  if(spin){spin.style.display='none'}
}
function applyKey(){
  const v=document.getElementById('ki').value.trim();
  const msg=document.getElementById('kmsg');
  if(!v){msg.textContent='Introduce una key válida';msg.style.color='var(--dn)';return}
  saveKey(v);
  msg.textContent='Key guardada. Actualizando precios…';msg.style.color='var(--up)';
  setTimeout(()=>{msg.textContent=''},4000);
  fetchAll();
}

async function addPos(){
  const sym=(document.getElementById('fsym').value||'').trim().toUpperCase();
  const shares=parseFloat(document.getElementById('fshares').value);
  const avgPrice=parseFloat(document.getElementById('fprice').value);
  const msg=document.getElementById('fmsg');
  if(!sym||isNaN(shares)||shares<=0||isNaN(avgPrice)||avgPrice<=0){msg.textContent='Completa todos los campos';msg.style.color='var(--dn)';return}
  const profile=_profileCache[sym]||null;
  const name=profile?.name||sym;
  const country=profile?.country||'';
  const currency=(profile?.currency||'USD').toUpperCase();
  const logo=profile?.logo||'';
  const ex=pf.findIndex(p=>p.symbol===sym);
  if(ex>=0){
    const o=pf[ex];const ts=o.shares+shares;
    pf[ex]={...o,shares:ts,avgPrice:parseFloat(((o.shares*o.avgPrice+shares*avgPrice)/ts).toFixed(6)),name,country,currency,logo};
    msg.textContent='Actualizado';
  }else{
    pf.push({symbol:sym,name,country,currency,logo,shares,avgPrice});
    msg.textContent='Añadido';
  }
  msg.style.color='var(--up)';save();
  ['fsym','fshares','fprice'].forEach(id=>{const e=document.getElementById(id);if(e)e.value=''});
  const card=document.getElementById('lookup-card');if(card)card.className='lookup-card';
  const spin=document.getElementById('lookup-spin');if(spin)spin.style.display='none';
  setTimeout(()=>{msg.textContent=''},3000);
  renderPos();
  // Re-open form after render and show loading msg
  const body=document.getElementById('add-form-body');
  const arrow=document.getElementById('add-form-arrow');
  if(body){body.classList.add('open');if(arrow)arrow.textContent='▾';}
  if(fkey){
    const msg2=document.getElementById('fmsg');
    if(msg2){msg2.textContent='Obteniendo precio y dividendo…';msg2.style.color='var(--fg3)';}
    try{await fetchQuote(sym);await sleep(120);await fetchDividend(sym)}catch{}
    recHist();renderAll();
    if(msg2){msg2.textContent='Listo';msg2.style.color='var(--up)';setTimeout(()=>{if(msg2)msg2.textContent=''},2000);}
  }
}

  const idx=pf.findIndex(p=>p.symbol===sym);

  const val=parseFloat(v);
  if(isNaN(val)||val<0)return;
  pf[idx].shares=val;save();renderPos();updateSidebar();
}
function saveBep(sym,v){
  const idx=pf.findIndex(p=>p.symbol===sym);
  if(idx<0)return;
  const val=parseFloat(v);
  if(isNaN(val)||val<0)return;
  pf[idx].avgPrice=val;save();renderPos();updateSidebar();
}
function saveCash(v){
  const val=parseFloat(v)||0;
  localStorage.setItem('pf6_cash',val);
  // Record cash history snapshot
  const today=new Date().toISOString().slice(0,10);
  const last=cashHist[cashHist.length-1];
  if(last&&last.d===today)cashHist[cashHist.length-1].v=val;
  else cashHist.push({d:today,v:val});
  if(cashHist.length>730)cashHist=cashHist.slice(-730);
  save();
  renderPos();updateSidebar();
  if(curTab==='dashboard')drawLine(aper);
}

function renderHistorico(){
  const el=document.getElementById('tab-historico');
  const sorted=[...hist].sort((a,b)=>b.d.localeCompare(a.d)); // newest first

  if(!sorted.length){
    el.innerHTML=`
      <div class="sec-row"><span class="sec-l">Histórico diario</span></div>
      <div class="empty" style="background:var(--s1);border:1px solid var(--b1);border-radius:10px">

        <span style="color:var(--fg3)">El primer registro se guardará automáticamente esta noche a las 00:00h.<br>
        A partir de entonces se registrará un snapshot diario del valor de cierre.</span>
      </div>`;
    return;
  }

  // Summary cards
  const first=sorted[sorted.length-1];
  const last=sorted[0];
  const carteraVar=first.cartera>0?(last.cartera-first.cartera)/first.cartera*100:0;
  const cuentaVar=first.cuenta>0?(last.cuenta-first.cuenta)/first.cuenta*100:0;

  const rows=sorted.map((h,i)=>{
    const prev=sorted[i+1];
    const dCartera=prev?h.cartera-prev.cartera:null;
    const dCuenta=prev?h.cuenta-prev.cuenta:null;
    const date=new Date(h.d+'T12:00:00');
    const dateStr=date.toLocaleDateString('es-ES',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
    return`<tr>
      <td style="text-align:left">
        <span class="mn">${dateStr}</span>
      </td>
      <td><span class="mn">${fmt(h.cartera,2)}</span></td>
      <td>
        ${dCartera!==null
          ?`<span class="mn ${dCartera>=0?'up':'dn'}">${dCartera>=0?'+':''}${fmt(dCartera,2)}</span>`
          :'<span class="mn2">—</span>'}
      </td>
      <td><span class="mn">${fmt(h.cash,2)}</span></td>
      <td><span class="mn" style="font-weight:500">${fmt(h.cuenta,2)}</span></td>
      <td>
        ${dCuenta!==null
          ?`<span class="mn ${dCuenta>=0?'up':'dn'}">${dCuenta>=0?'+':''}${fmt(dCuenta,2)}</span>`
          :'<span class="mn2">—</span>'}
      </td>
      <td>
        <button class="btn btn-rm" style="font-size:10px;padding:3px 7px" onclick="deleteHistEntry('${h.d}')">✕</button>
      </td>
    </tr>`;
  }).join('');

  el.innerHTML=`
    <div class="sec-row">
      <span class="sec-l">Histórico diario · ${sorted.length} registros</span>
      <span class="sec-l" style="color:var(--fg3)">Snapshot a las 00:00h cada día</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">
      <div class="sc"><div class="sc-l">Cartera actual</div><div class="sc-v">${fmt(last.cartera,2)}</div><div class="sc-s ${carteraVar>=0?'up':'dn'}">${carteraVar>=0?'+':''}${carteraVar.toFixed(2)}% desde inicio</div></div>
      <div class="sc"><div class="sc-l">Cash actual</div><div class="sc-v">${fmt(last.cash,2)}</div></div>
      <div class="sc"><div class="sc-l">Total cuenta</div><div class="sc-v">${fmt(last.cuenta,2)}</div><div class="sc-s ${cuentaVar>=0?'up':'dn'}">${cuentaVar>=0?'+':''}${cuentaVar.toFixed(2)}% desde inicio</div></div>
    </div>
    <div class="tbl-wrap">
      <table style="min-width:0">
        <thead><tr>
          <th style="text-align:left">Fecha</th>
          <th>Cartera</th>
          <th>Δ Cartera</th>
          <th>Cash</th>
          <th>Total cuenta</th>
          <th>Δ Cuenta</th>
          <th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="tbl-hint">// Snapshot automático a las 00:00h · El primer registro requiere que la app esté abierta o en segundo plano</div>
    </div>`;
}

function saveWl(){localStorage.setItem('pf6_wl',JSON.stringify(wl))}

async function fetchWlSymbol(sym){
  if(!fkey)return;
  wlLoading[sym]=true;
  try{
    // Quote — try Finnhub, fall back to Yahoo
    let price=0,change=0,priceSource='finnhub';
    try{
      const qr=await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${fkey}`);
      const q=await qr.json();
      if(q.c&&q.c>0){price=q.c;change=q.pc>0?((q.c-q.pc)/q.pc)*100:0}
      else throw new Error('no data');
    }catch{
      const y=await fetchQuoteYahoo(sym);
      price=y.price;change=y.change;priceSource='yahoo';
    }
    await sleep(150);
    // Metrics from Finnhub (no Yahoo equivalent for fundamentals)
    const mr=await fetch(`https://finnhub.io/api/v1/stock/metric?symbol=${sym}&metric=all&token=${fkey}`);
    const md=await mr.json();
    await sleep(150);
    const m=md.metric||{};
    const idx=wl.findIndex(w=>w.symbol===sym);
    if(idx>=0){
      wl[idx].metrics={
        price,change,source:priceSource,
        high52:m['52WeekHigh']||0,
        low52:m['52WeekLow']||0,
        per:m.peNormalizedAnnual||m.peTTM||0,
        evFcf:m.currentEv/m.freeCashFlowTTM||m.pfcfShareTTM||0,
        debtEquity:m.totalDebt/m.totalEquity||m.netDebtToEquity||0,
        revenueGrowth5y:m.revenueGrowth5Y||0,
        epsGrowth5y:m.epsGrowth5Y||0,
        ytdReturn:m['yearToDatePriceReturnDaily']||0,
        beta:m.beta||0,
        divPerShare:m.dividendPerShareAnnual||0,
        divYield:m.dividendYieldIndicatedAnnual||0,
      };
      saveWl();
    }
  }catch{}
  delete wlLoading[sym];
  if(curTab==='watchlist')renderWatchlist();
}

async function addWlSymbol(sym){
  sym=sym.trim().toUpperCase();
  if(!sym||wl.find(w=>w.symbol===sym))return;
  // Get profile for name/currency
  const prof=await fetchProfile(sym);
  wl.push({symbol:sym,name:prof?.name||sym,currency:prof?.currency||'USD',logo:prof?.logo||'',metrics:{}});
  saveWl();
  renderWatchlist();
  if(fkey)fetchWlSymbol(sym);
}

function removeWlSymbol(sym){
  wl=wl.filter(w=>w.symbol!==sym);
  saveWl();
  renderWatchlist();
}

async function refreshWatchlist(){
  if(!fkey||!wl.length)return;
  for(const w of wl){

}

          <span class="wl-cell-val ${m.ytdReturn>0?'up':m.ytdReturn<0?'dn':''}">${m.ytdReturn?fmtN(m.ytdReturn,2)+'%':na}</span>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--b1)">
        <div class="wl-cell" style="grid-column:span 1">
          <span class="wl-cell-lbl">Rango 52 semanas</span>
          ${m.high52>0?`
            <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
              <span style="font-family:var(--mono);font-size:9px;color:var(--fg3)">${fmtLocal(m.low52,cur,0)}</span>
              <div style="flex:1;height:3px;background:var(--b2);border-radius:2px;position:relative">
                <div style="position:absolute;left:${Math.min(Math.max(pos52,2),98)}%;top:-3px;width:7px;height:7px;border-radius:50%;background:var(--fg);transform:translateX(-50%)"></div>
              </div>
              <span style="font-family:var(--mono);font-size:9px;color:var(--fg3)">${fmtLocal(m.high52,cur,0)}</span>
            </div>
            <span style="font-family:var(--mono);font-size:9px;color:var(--fg3);margin-top:2px">${pos52.toFixed(0)}% del rango · Beta ${m.beta?fmtN(m.beta,2):na}</span>
          `:`<span class="wl-cell-val">${na}</span>`}
        </div>
        <div class="wl-cell">
          <span class="wl-cell-lbl">Dividendo anual</span>
          <span class="wl-cell-val">${m.divPerShare>0?fmtLocal(m.divPerShare,cur):na}</span>
          <span class="wl-cell-sub">${m.divYield>0?fmtN(m.divYield,2)+'% yield':''}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  el.innerHTML=`
    <div class="sec-row">
      <span class="sec-l">Watchlist · ${wl.length} acciones</span>
      ${fkey&&wl.length?`<button class="btn" style="font-family:var(--mono);font-size:9px;padding:5px 10px" onclick="refreshWatchlist()">↺ Actualizar</button>`:''}
    </div>
    <div class="card" style="margin-bottom:14px">
      <div class="wl-add-row">
        <input id="wl-input" type="text" placeholder="Ticker (AAPL, ASML, SAN.MC…)"
          onkeydown="if(event.key==='Enter'){addWlSymbol(this.value);this.value=''}">
        <button class="btn btn-p" style="white-space:nowrap" onclick="addWlSymbol(document.getElementById('wl-input').value);document.getElementById('wl-input').value=''">Añadir</button>
      </div>
      ${!fkey?`<div style="font-family:var(--mono);font-size:9px;color:rgba(255,200,0,.7);padding:8px 14px">Configura tu API key en ⚙ para ver los datos en tiempo real</div>`:''}
    </div>
    ${wl.length?rows:`<div class="empty" style="background:var(--s1);border:1px solid var(--b1);border-radius:10px">Añade tickers para seguirlos aquí</div>`}`;
}

function go(t){
  curTab=t;
  const tabs=['dashboard','posiciones','dividendos','historico','watchlist','config'];
  document.querySelectorAll('.nb').forEach((b,i)=>b.classList.toggle('on',tabs[i]===t));
  document.querySelectorAll('.mob-nb').forEach((b,i)=>b.classList.toggle('on',tabs[i]===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('tab-'+t).classList.add('on');
  if(t==='dashboard')renderDash();
  if(t==='posiciones')renderPos();
  if(t==='dividendos')renderDiv();
  if(t==='historico')renderHistorico();
  if(t==='watchlist')renderWatchlist();
  if(t==='config')renderConfig();
}

/* ─── INIT ─── */
setInterval(updateClock,1000);
// Migrate old hist format {d,v} → {d,cartera,cash,cuenta}
if(hist.length&&hist[0].v!==undefined){
  const cash=parseFloat(localStorage.getItem('pf6_cash')||0);
  hist=hist.map(h=>({d:h.d,cartera:h.v,cash,cuenta:h.v+cash}));
  save();
}
if(fkey&&pf.length){fetchAll()}else{renderAll()}
setInterval(()=>{if(fkey&&pf.length)fetchAll()},60000);
scheduleSnapshot();
</script>
</body>
</html>
